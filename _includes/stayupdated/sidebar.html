<div class="source-filters-container filter-sidebar">
  <header class="source-filters-header">
    <h2 class="source-filters-title">Sources</h2>
    <div class="source-filters-actions source-filters-actions--primary">
      <span class="folder-action folder-action--text" id="selectAllSources" role="button" tabindex="0" title="Select all sources" aria-label="Select all sources">All</span>
      <span class="source-filters-actions__sep" aria-hidden="true">·</span>
      <span class="folder-action folder-action--text" id="deselectAllSources" role="button" tabindex="0" title="Clear selection" aria-label="Clear selection">None</span>
    </div>
    <button type="button"
            class="su-sidebar-panel-close"
            id="sidebarPanelCloseBtn"
            aria-label="Hide sources panel"
            title="Hide sources (I)">
      <span aria-hidden="true">×</span>
    </button>
  </header>

  <div class="filter-presets" role="group" aria-label="Quick filter presets">
    <button type="button" class="post-tag" data-preset="government">Government</button>
    <button type="button" class="post-tag" data-preset="news">News</button>
    <button type="button" class="post-tag" data-preset="research">OSINT</button>
    <button type="button" class="post-tag" data-preset="offensive">Offensive</button>
    <button type="button" class="post-tag" data-preset="bugbounty">Bug Bounty</button>
    <button type="button" class="post-tag" data-preset="cloud">Cloud</button>
    <button type="button" class="post-tag" data-preset="community">Community</button>
  </div>

  <div class="source-search-wrapper">
    <label for="sourceSearch" class="sr-only">Search sources</label>
    <input type="text"
           class="source-search"
           id="sourceSearch"
           placeholder="Search sources…"
           aria-label="Search sources"
           autocomplete="off"
           spellcheck="false">
  </div>

  <div class="source-filters" id="sourceFilters" role="tree" aria-label="Source categories"></div>
</div>
