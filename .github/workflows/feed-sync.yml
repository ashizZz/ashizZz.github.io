# Refreshes assets/data/feeds-snapshot.json for Stay Updated.
# Billing: GitHub Actions minutes are free for public repos. This job does not
# run on private repositories (see job `if` below).
name: Sync feed snapshot

on:
  schedule:
    # Every 6 hours — lightweight; no charge on public repos
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: feed-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip entirely if the repo is not public (private repos use billable minutes)
    if: github.event.repository.visibility == 'public'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sync dependencies
        working-directory: scripts
        run: npm ci

      - name: Build feeds-snapshot.json
        working-directory: scripts
        run: node sync-feeds.mjs

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(feeds): refresh static snapshot'
          file_pattern: assets/data/feeds-snapshot.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
